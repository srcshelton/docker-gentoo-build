# Ensure that strong optimisation flags aren't breaking critical builds, as has
# been observed on arm64 with gcc-15 (but not arm64 with gcc-14, or amd64)
#
# N.B.  ${_TARGET_CPU_CFLAGS} and ${_TARGET_CPU_RUSTFLAGS} should already exist
#       in the container environment, via Dockerfile.env;
#       amd64/x86 && ppc add '-z pack-relative-relocs' to LDFLAGS
#
# TODO: Consider using https://github.com/vaeth/portage-bashrc-mv
#

CPPFLAGS=""
COMMON_FLAGS="${_TARGET_CPU_CFLAGS} -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
case "$( uname -m )" in
	'i386'|'i686'|'ppc'|'ppc64'|'ppc64le'|'x86_64')
		LDFLAGS="-Wl,-O1 -Wl,--as-needed -Wl,-z,pack-relative-relocs"
		RUSTFLAGS="${_TARGET_CPU_RUSTFLAGS} -C strip=debuginfo -C opt-level=3 -C link-arg=-Wl,-O2 -C link-arg=-Wl,--as-needed -C link-arg=-Wl,-z,pack-relative-relocs"
		;;
	*)
		LDFLAGS="-Wl,-O1 -Wl,--as-needed"
		RUSTFLAGS="${_TARGET_CPU_RUSTFLAGS} -C strip=debuginfo -C opt-level=3 -C link-arg=-Wl,-O2 -C link-arg=-Wl,--as-needed"
		;;
esac

FFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FLFLAGS="${LDFLAGS}"

CGO_CPPFLAGS=""
CGO_CFLAGS="${COMMON_FLAGS}"
CGO_CXXFLAGS="${COMMON_FLAGS}"
CGO_FFLAGS="${COMMON_FLAGS}"
CGO_LDFLAGS="${LDFLAGS}"

#GOFLAGS="-trimpath '-ldflags=-bindnow -s -w'"

#FEATURES="test"

export CPPFLAGS CFLAGS CXXFLAGS LDFLAGS FFLAGS FCFLAGS FLFLAGS CGO_CPPFLAGS CGO_CFLAGS CGO_CXXFLAGS CGO_FFLAGS CGO_LDFLAGS GOFLAGS RUSTFLAGS FEATURES
